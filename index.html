<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아포칼립스 생존 지도 v0.2</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* 화면 전체를 지도로 채우기 */
        html, body { margin: 0; padding: 0; height: 100%; background: #111; }
        #map { width: 100%; height: 100%; }
        
        /* 아포칼립스 분위기의 팝업창 스타일링 */
        .leaflet-popup-content-wrapper {
            background: #222;
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
            font-family: 'Courier New', monospace;
        }
        .leaflet-popup-tip { background: #222; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // 2. 지도 초기화 (경위도 좌표 중심점 설정: 성균관대 자연과학캠퍼스 부근)
        // [37.2939, 126.9749]는 중심 좌표, 13은 초기 확대 배율입니다.
        const map = L.map('map').setView([37.2939, 126.9749], 13);

        // 3. 아포칼립스풍 '다크 맵' 타일 입히기 (CartoDB Dark Matter 오픈소스 타일 사용)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // 4. 테스트용 아포칼립스 거점 데이터 (추후 JSON 파일로 분리 가능)
        const apocalypsePlaces = [
            {
                name: "⚠️ 성균관대 생존자 캠프",
                coords: [37.2939, 126.9749],
                desc: "안전 등급: 녹색(A). 고지대에 위치하여 좀비 방어 용이. 식량 비축량 2달 분 남음."
            },
            {
                name: "💀 수원역 감염 구역",
                coords: [37.2664, 127.0002],
                desc: "위험 등급: 적색(X). 변종 생명체 대량 출몰. 중무장 상태가 아니라면 접근 절대 금지."
            }
        ];

        // 5. 지도 위에 마커 찍고 클릭 이벤트(팝업) 연결하기
        apocalypsePlaces.forEach(place => {
            const marker = L.marker(place.coords).addTo(map);
            
            // 마커를 클릭했을 때 나타날 텍스트 설정
            marker.bindPopup(`<b>${place.name}</b><br><p style="color:#ccc; font-size:12px;">${place.desc}</p>`);
        });
    </script>
</body>
</html>
