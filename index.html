<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재라에(JAERA-E) 아포칼립스 도심지</title>
    <link rel="stylesheet" href="style.css">
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background-color: #0f1112; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        .wrapper { display: flex; width: 100%; height: 100%; }
        .side-panel { width: 340px; background: #111314; color: #d1d4d7; padding: 25px; box-sizing: border-box; border-right: 2px solid #282a2d; display: flex; flex-direction: column; z-index: 2000; }
        .panel-title { font-size: 26px; font-weight: bold; color: #ff4d4d; letter-spacing: 3px; margin-bottom: 5px; }
        .panel-subtitle { font-size: 15px; color: #ff8a4d; margin-bottom: 20px; }
        .panel-info { font-size: 13px; color: #8a9095; line-height: 1.6; background: #191b1d; padding: 16px; border-radius: 4px; border-left: 4px solid #ff4d4d; }
        #map { flex-grow: 1; height: 100%; background-color: #1e2421 !important; }

        .toggle-container {
            position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex;
            background: rgba(17, 19, 20, 0.95); border: 2px solid #e86f25; border-radius: 8px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .toggle-btn {
            padding: 12px 22px; font-size: 15px; font-weight: bold; color: #ddd;
            background: transparent; border: none; cursor: pointer; transition: all 0.25s;
        }
        .toggle-btn.active { background: #e86f25; color: white; }

        .leaflet-popup-content-wrapper { background: #111314; color: #ddd; border: 2px solid #e86f25; }
        .popup-title { font-weight: bold; color: #ff6b1a; border-bottom: 1px solid #444; padding-bottom: 6px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="side-panel">
            <div class="panel-title">JAERA-E</div>
            <div class="panel-subtitle">아포칼립스 도시 지도</div>
            <div class="panel-info">
                현실적인 도시 구조 · 군사 작전 지도 · 생존자 거점 운영 · 지상/지하 레이어 · 전략 시뮬레이션
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // ====== 기본 지도 초기화 ======
        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -1,
            maxZoom: 3
        }).setView([300,300], 0);

        // ====== 기본 레이어 그룹 ======
        var commonGroup = L.layerGroup().addTo(map);
        var surfaceGroup = L.layerGroup().addTo(map);
        var undergroundGroup = L.layerGroup().addTo(map);

        // ====== 도로망 ======
        var road1 = L.polyline([[100,200],[150,200],[200,200]], {color:'gray'}).addTo(surfaceGroup);

        // ====== 건물 (수정 반영) ======
        var buildingA = L.polygon([[150,170],[170,170],[170,190],[150,190]], {
            color:'brown',
            hubId: 'hub01'
        }).addTo(surfaceGroup);

        var buildingB = L.polygon([[270,250],[290,250],[290,270],[270,270]], {color:'brown'}).addTo(surfaceGroup);

        var buildingC = L.polygon([[320,195],[340,195],[340,215],[320,215]], {color:'brown'}).addTo(surfaceGroup);

        // ====== 장벽 외부 지역 확장 ======
        var farmArea = L.polygon([[500,500],[560,500],[560,560],[500,560]], {
            color: 'green',
            fillColor: '#3b6e3b',
            fillOpacity: 0.6
        }).bindPopup("<div class='popup-title'>외곽 농촌</div>식량 확보 가능 지역").addTo(surfaceGroup);

        var factoryRuins = L.polygon([[600,450],[680,450],[680,520],[600,520]], {
            color: 'gray',
            fillColor: '#555',
            fillOpacity: 0.5
        }).bindPopup("<div class='popup-title'>폐공장</div>자원 수색 가능 지역").addTo(surfaceGroup);

        var checkpoint = L.rectangle([[450,600],[480,630]], {
            color: 'red',
            fillColor: '#a33',
            fillOpacity: 0.7
        }).bindPopup("<div class='popup-title'>검문소</div>통제 구역, 출입 제한").addTo(surfaceGroup);

        // ====== 거점 마커 (건물 연결 반영) ======
        var hubIcon = L.icon({
            iconUrl: 'icons/hub.png',
            iconSize: [32,32]
        });

        var hubMarker = L.marker([160,180], {
            icon: hubIcon,
            buildingId: 'buildingA'
        }).bindPopup("생존자 거점").addTo(commonGroup);

        // ====== 기존 팝업/마커/토글 시스템은 그대로 유지 ======
    </script>
</body>
</html>
