<!DOCTYPE html>
<html lang="ko">
<head>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; background-color: #111314; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }

        .side-panel { width: 320px; background: #111314; color: #d1d4d7; padding: 25px; box-sizing: border-box; border-right: 2px solid #282a2d; display: flex; flex-direction: column; z-index: 2000; }
        .panel-title { font-size: 24px; font-weight: bold; color: #ffffff; letter-spacing: 2px; margin-bottom: 5px; }
        .panel-subtitle { font-size: 14px; color: #ff4d4d; font-weight: bold; border-bottom: 1px solid #282a2d; padding-bottom: 15px; margin-bottom: 20px; }

        .tactical-box { width: 30px; height: 30px; background: #f8f9fa; border: 2px solid #3a3f44; border-radius: 5px; box-shadow: 0px 3px 6px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; font-size: 16px; z-index: 5; }

</head>
<body>
    <div class="wrapper">
        <div class="side-panel">
            <div class="panel-title">재라에</div>
            <div class="panel-subtitle">JAERA-E 격리거점</div>
            <p style="font-size: 12px; margin: 0 0 15px 0; color: #aaa;">[SYSTEM]: 구역/건물 클릭 시 상세 정보 브리핑을 출력합니다.</p>

            [[315, 515], [335, 545]], [[315, 555], [335, 580]], [[315, 590], [335, 615]], [[315, 625], [335, 650]], [[315, 660], [335, 685]],

            [[415, 315], [435, 345]], [[415, 355], [435, 380]],
            [[440, 315], [460, 345]], [[440, 355], [460, 380]],
            [[465, 315], [485, 345]], [[465, 355], [485, 380]],

            // ===== B13-S3 (410~540, 410~490) =====
            [[415, 415], [435, 445]], [[415, 455], [435, 480]],
            [[440, 415], [460, 445]], [[440, 455], [460, 480]],

        // ============================================================================
        // 1. 외곽 전술 격리 장벽
        // ============================================================================
        L.rectangle([[100, 100], [500, 700]], {color: "#495057", weight: 7, fill: false}).addTo(map);
        L.rectangle([[104, 104], [496, 696]], {color: "#ffffff", weight: 2, fill: false, dashArray: "8, 6"}).addTo(map);

        // ============================================================================
        // 2. 도로 인프라망
        // ============================================================================
        // 남북 대로
        L.polyline([[300, 0], [300, 800]], {color: "#ffffff", weight: 10}).addTo(map);
        // 동서 대로
        L.polyline([[0, 400], [600, 400]], {color: "#ffffff", weight: 10}).addTo(map);

        // 블록 구분 도로 (내부)
        const innerRoads = [
            [[200, 100], [200, 395]],
            [[400, 100], [400, 395]],
            [[100, 250], [295, 250]],
            [[305, 250], [500, 250]],
            [[100, 550], [295, 550]],
            [[305, 550], [500, 550]]
        ];
        innerRoads.forEach(path => L.polyline(path, {color: "#ffffff", weight: 4}).addTo(map));

        // 외부 도로
        const outerRoads = [
            [[50, 0], [50, 800]],
            [[550, 0], [550, 800]],
            [[0, 50], [600, 50]],
            [[0, 750], [600, 750]]
        ];
        outerRoads.forEach(path => L.polyline(path, {color: "#ffffff", weight: 5}).addTo(map));

        L.polyline([[400, 0], [400, 600]], {color: "#617485", weight: 4, dashArray: "8, 6"}).addTo(map);

        // ============================================================================
        // 4. 안내 레이블
        // ============================================================================
        const legendHtml = '<div style="background: rgba(17, 19, 20, 0.95); padding: 8px 12px; border: 1px solid #617485; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); color: #bcccda; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 8px; white-space: nowrap;"><div style="width: 25px; height: 0; border-top: 3px dashed #617485;"></div><span>이 표기는 <span style="color:#ffffff;">지하철 노선도</span> 표기입니다.</span></div>';
        L.marker([20, 565], {
            icon: L.divIcon({ html: legendHtml, className: 'custom-legend', iconSize: [220, 30] }),
            interactive: false
        }).addTo(map);

        // ============================================================================
        // 5. 중앙 수목공원
        // ============================================================================

        // ============================================================================
        // 6. 특수 형태 건물들
        // ============================================================================
        const customShapes = [
            { coords: [[245, 470], [290, 470], [290, 520], [275, 520], [275, 490], [245, 490]], color: "#7b8587", fill: "#9ea9ab" },
            { coords: [[440, 115], [490, 115], [490, 155], [465, 155], [465, 215], [440, 215]], color: "#889294", fill: "#abb5b7" },
            { coords: [[275, 335], [335, 335], [335, 375], [310, 375], [310, 415], [275, 415]], color: "#889294", fill: "#abb5b7" }
        ];
        customShapes.forEach(sh => {
            L.polygon(sh.coords, {color: sh.color, weight: 2, fillColor: sh.fill, fillOpacity: 0.95}).addTo(map);
        });

        // ============================================================================
        // 7. 고정 좌표 건물 렌더링
        // ============================================================================
        buildings.forEach(coord => {
            L.rectangle(coord, {color: "#a3acae", weight: 1.5, fillColor: "#bdc6c7", fillOpacity: 0.9}).addTo(map);
        });

        // ============================================================================

        // ============================================================================
        L.polyline([[500, 385], [500, 415]], {color: "#c92a2a", weight: 5}).addTo(map);

        L.polyline([[285, 100], [315, 100]], {color: "#c92a2a", weight: 5}).addTo(map);
        L.polyline([[285, 700], [315, 700]], {color: "#c92a2a", weight: 5}).addTo(map);

        // ============================================================================

        // ============================================================================
        const jaeraeNodes = [
            { name: "침수된 지하 상가", icon: "💧", coords: [200, 250], desc: "철로 하부 핵심 상가. 허리까지 차오른 유독성 오염수 아래 군용 보급함이 잠겨 있습니다." },
            { name: "끝이 막힌 폐지하철", icon: "🚇", coords: [400, 450], desc: "탈출 차량들이 연쇄 충돌해 궤도를 이탈한 지하 터널의 무덤 구역입니다." },
            { name: "축축한 지하 철길", icon: "🛤️", coords: [400, 150], desc: "배수 인프라 차단으로 상시 습기가 유지되어 정체불명의 포자 균류가 번식한 철로입니다." },
            { name: "고요한 환승 구역", icon: "🔄", coords: [200, 150], desc: "통제관문(남) 위쪽 지하철 노선 상에 위치한 환승역 인프라 코어입니다." },
            { name: "비밀스러운 지하 수로", icon: "🌊", coords: [150, 620], desc: "지하 인프라와 연결된 암거 시설로 방사능 낙진을 피할 수 있는 하부 은밀 대피로입니다." },
            { name: "잿빛 공장 지대", icon: "🏭", coords: [465, 170], desc: "제1메조 가동동 내부. 유독 가스 메인 밸브 차단 장치가 망가진 상태로 격리되어 있습니다." },
            { name: "고철 더미의 정원", icon: "🏗️", coords: [520, 250], desc: "공장 폐기물 야적장 바닥. 전술 방벽으로 응용 수집 가능한 두꺼운 자재 철판이 다수 존재합니다." },

        ];

        jaeraeNodes.forEach(node => {
            const tacticalHtml = '<div class="tactical-marker-container"><div class="tactical-box">' + node.icon + '</div><div class="tactical-pointer"></div><div class="tactical-title-tag">' + node.name + '</div></div>';
            const tacticalIcon = L.divIcon({ html: tacticalHtml, className: 'custom-nakwon-marker', iconSize: [40, 50], iconAnchor: [20, 36], popupAnchor: [0, -36] });
            const popupContent = '<div class="popup-title">' + node.icon + ' ' + node.name + '</div><div style="font-size: 12px; line-height: 1.5; color: #bcccda;">' + node.desc + '</div><div style="font-size: 10px; color: #5c6266; margin-top: 8px; text-align: right; font-family: monospace;">SYS_GRID: [' + node.coords[1] + ', ' + node.coords[0] + ']</div>';
            L.marker(node.coords, { icon: tacticalIcon }).addTo(map).bindPopup(popupContent);
        });

        // ============================================================================
        // 10. 맵 초기화
        // ============================================================================
        map.fitBounds(mapBounds);
        map.setMinZoom(map.getZoom());
        map.setMaxZoom(map.getZoom() + 2);

        // ============================================================================
        // 11. 맵 정보
        // ============================================================================
        console.log("✅ REDESIGNED BLOCK SYSTEM");
        console.log("Total Buildings:", buildings.length);
        console.log("City Blocks:", cityBlocks.length);
        console.log("Interior Coverage: ~82% (4x4 grid)");
        console.log("Block Structure: Uniform subdivision with central park");
        console.log("Building Density: High (80%+ fill per block)");
        console.log("Map Type: Fixed Coordinate System");
    </script>
</body>
