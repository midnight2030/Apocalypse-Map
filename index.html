<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재라에(JAERA-E) 아포칼립스 도심지</title>
   
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background-color: #0f1112; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        .wrapper { display: flex; width: 100%; height: 100%; }
        .side-panel { width: 340px; background: #111314; color: #d1d4d7; padding: 25px; box-sizing: border-box; border-right: 2px solid #282a2d; display: flex; flex-direction: column; z-index: 2000; }
        .panel-title { font-size: 26px; font-weight: bold; color: #ff4d4d; letter-spacing: 3px; margin-bottom: 5px; }
        .panel-subtitle { font-size: 15px; color: #ff8a4d; margin-bottom: 20px; }
        .panel-info { font-size: 13px; color: #8a9095; line-height: 1.6; background: #191b1d; padding: 16px; border-radius: 4px; border-left: 4px solid #ff4d4d; }
        #map { flex-grow: 1; height: 100%; background-color: #1e2421 !important; }

        .toggle-container {
            position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex;
            background: rgba(17, 19, 20, 0.95); border: 2px solid #e86f25; border-radius: 8px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .toggle-btn {
            padding: 12px 22px; font-size: 15px; font-weight: bold; color: #ddd;
            background: transparent; border: none; cursor: pointer; transition: all 0.25s;
        }
        .toggle-btn.active { background: #e86f25; color: white; }

        .tactical-marker-container { position: relative; width: 42px; height: 48px; display: flex; flex-direction: column; align-items: center; }
        .tactical-box { width: 32px; height: 32px; background: #1f2523; border: 2px solid #e86f25; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .tactical-pointer { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 8px solid #e86f25; margin-top: -2px; }
        .tactical-title-tag { position: absolute; top: 38px; background: rgba(0,0,0,0.85); color: #fff; font-size: 9.5px; padding: 2px 6px; border-radius: 3px; white-space: nowrap; border: 1px solid #e86f25; }

        .leaflet-popup-content-wrapper { background: #111314; color: #ddd; border: 2px solid #e86f25; }
        .popup-title { font-weight: bold; color: #ff6b1a; border-bottom: 1px solid #444; padding-bottom: 6px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="side-panel">
            <div class="panel-title">재라에</div>
            <div class="panel-subtitle">JAERA-E 아포칼립스 도심지</div>
            <p style="font-size: 13px; margin: 0 0 15px 0; color: #aaa;">[SYSTEM] 건물·거점 클릭 시 정보 표시</p>
            <div class="panel-info">
                대한민국 중소도시 '재라에'가 감염 사태 47일째.<br>
                주요 대로변은 버려진 차량으로 막혔고, 지하철은 일부 구간이 침수·붕괴되었다.
            </div>
            <div style="margin-top: auto; font-size: 12px; color: #555;">OPERATOR v4.0 // CITY-SCALE APOCALYPSE</div>
        </div>
        <div id="map"></div>
    </div>

    <div class="toggle-container">
        <button id="surfaceBtn" class="toggle-btn active">지상</button>
        <button id="undergroundBtn" class="toggle-btn">지하</button>
    </div>

    <script>
        const mapBounds = [[0, 0], [700, 900]];
        const map = L.map('map', {
            crs: L.CRS.Simple,
            zoomControl: false,
            maxBounds: mapBounds,
            maxBoundsViscosity: 1.0
        });

        const commonGroup = L.layerGroup().addTo(map);
        const surfaceGroup = L.layerGroup().addTo(map);
        const undergroundGroup = L.layerGroup();

        // ====================== 현실적인 도로망 ======================
        // 주요 대로 (넓음)
        L.polyline([[100, 350], [600, 350]], {color: "#ddd", weight: 18}).addTo(commonGroup); // 중앙 횡단 대로
        L.polyline([[350, 50], [350, 850]], {color: "#ddd", weight: 18}).addTo(commonGroup); // 중앙 종단 대로

        // 보조 도로
        const roads = [
            [[150, 150], [550, 150]], [[150, 550], [550, 550]],
            [[200, 100], [200, 800]], [[500, 100], [500, 800]],
            [[250, 250], [450, 250]], [[250, 450], [450, 450]],
            [[250, 650], [450, 650]]
        ];
        roads.forEach(r => L.polyline(r, {color: "#ccc", weight: 9}).addTo(commonGroup));

        // 좁은 골목
        const alleys = [
            [[280, 120], [280, 280]], [[420, 120], [420, 280]],
            [[280, 420], [280, 580]], [[420, 420], [420, 580]],
            [[120, 280], [250, 280]], [[450, 280], [580, 280]]
        ];
        alleys.forEach(a => L.polyline(a, {color: "#bbb", weight: 5, dashArray: "3,3"}).addTo(commonGroup));

        // ====================== 외곽 장벽 ======================
        L.rectangle([[80, 80], [620, 820]], {color: "#444", weight: 12, fill: false}).addTo(commonGroup);

        // ====================== 지상 건물 (블록 단위) ======================
        // 북쪽 상업지구
        const commercial = [
            [[120,120],[200,220]], [[220,120],[290,200]], [[310,120],[380,210]],
            [[410,120],[480,195]], [[500,130],[580,220]]
        ];
        commercial.forEach(r => L.rectangle(r, {color:"#777", weight:2, fillColor:"#999", fillOpacity:0.85}).addTo(surfaceGroup));

        // 중앙 주거지구
        const residential = [
            [[120,380],[210,480]], [[230,370],[310,460]], [[330,380],[410,470]],
            [[430,370],[510,460]], [[120,520],[200,620]], [[230,530],[310,610]],
            [[520,520],[590,610]]
        ];
        residential.forEach(r => L.rectangle(r, {color:"#666", weight:2, fillColor:"#888", fillOpacity:0.9}).addTo(surfaceGroup));

        // 남쪽 산업/창고지구
        const industrial = [
            [[120,680],[230,780]], [[260,670],[350,760]], [[380,680],[480,770]],
            [[500,690],[590,790]]
        ];
        industrial.forEach(r => L.rectangle(r, {color:"#5c5c5c", weight:2, fillColor:"#777", fillOpacity:0.9}).addTo(surfaceGroup));

        // 학교·병원 등 특수건물
        L.rectangle([[380, 240], [460, 310]], {color:"#555", weight:2, fillColor:"#a88", fillOpacity:0.9}).addTo(surfaceGroup); // 병원
        L.rectangle([[240, 240], [310, 300]], {color:"#555", weight:2, fillColor:"#9b9", fillOpacity:0.85}).addTo(surfaceGroup); // 학교

        // 중앙 공원
        L.polygon([[340, 480], [480, 480], [480, 590], [340, 590]], 
            {color: "#4a5", weight: 3, fillColor: "#5a7", fillOpacity: 0.75})
            .addTo(surfaceGroup)
            .bindTooltip("붕괴한 중앙공원", {permanent: true, direction: "center", className: "blueprint-label"});

        // ====================== 지하철 노선 ======================
        L.polyline([[80, 280], [620, 280]], {color: "#4a6", weight: 6, dashArray: "10,8"}).addTo(undergroundGroup);
        L.polyline([[80, 620], [620, 620]], {color: "#4a6", weight: 6, dashArray: "10,8"}).addTo(undergroundGroup);
        L.polyline([[280, 100], [280, 800]], {color: "#4a6", weight: 6, dashArray: "10,8"}).addTo(undergroundGroup);
        L.polyline([[420, 100], [420, 800]], {color: "#4a6", weight: 6, dashArray: "10,8"}).addTo(undergroundGroup);

        // ====================== 거점 마커 (도시 곳곳) ======================
        const nodes = [
            {name:"침수된 지하상가", icon:"💧", coords:[280, 290], desc:"지하철역 연결 상가. 오염수가 차올라 보급품이 잠겨있다.", underground:true},
            {name:"폐쇄된 지하철 터널", icon:"🚇", coords:[420, 630], desc:"차량 충돌로 막힌 주요 지하 노선.", underground:true},
            {name:"축축한 환승역", icon:"🔄", coords:[280, 620], desc:"지하철 환승 코어. 포자가 번식 중.", underground:true},
            {name:"붕괴한 중앙몰", icon:"🏬", coords:[400, 520], desc:"대형 쇼핑몰 잔해. 내부에 생존자 캠프 흔적.", underground:false},
            {name:"파괴된 식자재마트", icon:"🛒", coords:[180, 420], desc:"대형 마트. 식량은 거의 소진되었으나 공구류 풍부.", underground:false},
            {name:"고철 야적장", icon:"🏭", coords:[550, 720], desc:"산업지구 폐공장. 철판·부품 다량.", underground:false},
            {name:"초록늪 병원", icon:"🏥", coords:[420, 270], desc:"감염자 발생 1번지. 약품 잔여 기대.", underground:false},
            {name:"버려진 차량 묘지", icon:"🚗", coords:[320, 150], desc:"주요 대로 완전 정체 구간.", underground:false},
            {name:"반파된 도서관", icon:"📚", coords:[240, 550], desc:"행정 기록과 지도 보관.", underground:false},
            {name:"콘크리트 타워", icon:"🗼", coords:[510, 380], desc:"고층 아파트. 무장 생존자 점거 중.", underground:false}
        ];

        nodes.forEach(node => {
            const html = `<div class="tactical-marker-container"><div class="tactical-box">${node.icon}</div><div class="tactical-pointer"></div><div class="tactical-title-tag">${node.name}</div></div>`;
            const icon = L.divIcon({html, className:'', iconSize:[42,50], iconAnchor:[21,40]});
            const popup = `<div class="popup-title">${node.icon} ${node.name}</div><div style="font-size:13px;line-height:1.5;">${node.desc}</div>`;

            const marker = L.marker(node.coords, {icon}).bindPopup(popup);
            (node.underground ? undergroundGroup : surfaceGroup).addLayer(marker);
        });

        // ====================== 토글 ======================
        const surfaceBtn = document.getElementById('surfaceBtn');
        const undergroundBtn = document.getElementById('undergroundBtn');

        function setMode(underground) {
            if (underground) {
                surfaceGroup.removeFrom(map);
                undergroundGroup.addTo(map);
                surfaceBtn.classList.remove('active');
                undergroundBtn.classList.add('active');
            } else {
                undergroundGroup.removeFrom(map);
                surfaceGroup.addTo(map);
                surfaceBtn.classList.add('active');
                undergroundBtn.classList.remove('active');
            }
        }

        surfaceBtn.addEventListener('click', () => setMode(false));
        undergroundBtn.addEventListener('click', () => setMode(true));

        // 초기화
        map.fitBounds(mapBounds);
        map.setMaxZoom(3);
        console.log("✅ 재라에 아포칼립스 도심지도 v4.0 로드 완료");
    </script>
</body>
</html>
