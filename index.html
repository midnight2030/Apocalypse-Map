<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>재라에(JAERA-E) 전술 작전 통제망</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map { margin: 0; padding: 0; height: 100%; background: #111314; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = L.map('map', { crs: L.CRS.Simple, zoomControl: false });
        const mapBounds = [[0, 0], [600, 800]];
        map.fitBounds(mapBounds);

        // 1. 도시 블록 데이터 (Polygon 기반)
        const urbanBuildings = [
            // 북서구역 (공장)
            { name: "대형 ㄷ자 공장", type: "polygon", path: [[130, 120], [360, 120], [360, 180], [190, 180], [190, 260], [360, 260], [360, 280], [130, 280]], color: "#595d60" },
            // 북동구역 (상업)
            { name: "업무빌딩(L자)", type: "polygon", path: [[130, 420], [300, 420], [300, 480], [200, 480], [200, 600], [130, 600]], color: "#dee2e6" },
            // 남서구역 (주거)
            { name: "아파트단지", type: "rect", path: [[420, 120], [550, 180]], color: "#adb5bd" },
            // 남동구역 (의료)
            { name: "병원(U자)", type: "polygon", path: [[420, 420], [660, 420], [660, 670], [420, 670], [420, 620], [600, 620], [600, 480], [420, 480]], color: "#dbe9f0" }
        ];

        // 2. 렌더링
        urbanBuildings.forEach(b => {
            if (b.type === "polygon" || b.type === "rect") {
                L.polygon(b.path, { color: "#343a40", weight: 2, fillColor: b.color, fillOpacity: 1 }).addTo(map);
            }
        });
    </script>
</body>
</html>
