<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재라에(JAERA-E) 전술 작전 통제망</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; background-color: #161719; font-family: 'Courier New', 'Malgun Gothic', monospace; overflow: hidden; }
        
        /* 대시보드 레이아웃 */
        .wrapper { display: flex; width: 100%; height: 100%; }
        
        /* 왼쪽 정보 패널 */
        .side-panel {
            width: 320px;
            background: #0f1011;
            color: #d1d4d7;
            padding: 25px;
            box-sizing: border-box;
            border-right: 2px solid #282a2d;
            display: flex;
            flex-direction: column;
            z-index: 2000;
        }
        .panel-title { font-size: 24px; font-weight: bold; color: #ffffff; letter-spacing: 2px; margin-bottom: 5px; }
        .panel-subtitle { font-size: 14px; color: #c92a2a; font-weight: bold; border-bottom: 1px solid #282a2d; padding-bottom: 15px; margin-bottom: 20px; }
        .panel-info { font-size: 12px; color: #8a9095; line-height: 1.6; background: #151618; padding: 15px; border-radius: 4px; border-left: 3px solid #c92a2a; }

        /* 우측 지도 영역 */
        #map { 
            flex-grow: 1; 
            height: 100%; 
            background-color: #1e2022; 
            cursor: zoom-in !important; 
        }

        /*모든 지형 요소 및 마커 위에서 돋보기 커서 강제 유지 */
        .leaflet-interactive, path, .marker-container, .triangle-icon, .triangle-down {
            cursor: zoom-in !important;
        }

        /* 은은한 피 얼룩 효과 */
        .blood-overlay {
            position: absolute;
            top: 0; left: 320px; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.12; 
            background: 
                radial-gradient(circle at 25% 30%, #6b0d0d 0%, transparent 15%),
                radial-gradient(circle at 80% 70%, #4a0000 0%, transparent 12%);
        }

        /* 역삼각형 마커 스타일 */
        .marker-container {
            position: relative;
            width: 36px;
            height: 32px;
        }
        .triangle-down {
            width: 0; height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 32px solid #c92a2a; 
            filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.6));
        }
        .triangle-icon {
            position: absolute;
            top: 4px; left: 0;
            width: 36px;
            text-align: center;
            font-size: 13px;
            line-height: 1;
            z-index: 10;
        }

        /* 전술 청사진 스타일 라벨 */
        .blueprint-label {
            background: transparent !important;
            border: none !important;
            color: #717a82 !important;
            font-size: 10px !important;
            font-weight: bold;
            box-shadow: none !important;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* 브리핑 스타일 팝업창 */
        .leaflet-popup-content-wrapper {
            background: #0f1011;
            color: #d1d4d7;
            border: 1px solid #c92a2a;
            border-radius: 0px;
            padding: 5px;
        }
        .leaflet-popup-tip { background: #0f1011; border: 1px solid #c92a2a; }
        .popup-title { font-weight: bold; color: #ff4d4d; border-bottom: 1px dashed #333; padding-bottom: 6px; margin-bottom: 8px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="side-panel">
            <div class="panel-title">재라에</div>
            <div class="panel-subtitle">JAERA-E 작전 통제망</div>
            <p style="font-size: 13px; margin: 0 0 15px 0;">[SYSTEM]: 구역/건물 클릭 시 상세 정보 브리핑을 출력합니다.</p>
            <div class="panel-info">
                본 화면은 '재라에 격리 구역'의 최종 보완 청사진입니다. 외곽 대장벽선 내부의 모든 기반 시설물 및 오염 거점이 실시간 동기화됩니다.
            </div>
            <div style="margin-top: auto; font-size: 11px; color: #444;">SECURITY LEVEL // MAX</div>
        </div>
        <div id="map"></div>
    </div>
    <div class="blood-overlay"></div>

    <script>
        // 1. 가상 좌표계 구성 및 화면 고정 설정
        const mapBounds = [[0, 0], [600, 800]];
        const map = L.map('map', {
            crs: L.CRS.Simple,
            zoomControl: false,
            maxBounds: mapBounds, 
            maxBoundsViscosity: 1.0
        });

        // ==========================================
        // 🧱 1. 거대한 사방 방어 대장벽 (Great Border Wall) 배치
        // ==========================================
        // 맵의 가장자리를 단단하게 감싸는 삼중 보안 격리 장벽선
        L.rectangle([[20, 20], [580, 780]], {color: "#151617", weight: 8, fill: false}).addTo(map);
        L.rectangle([[25, 25], [575, 775]], {color: "#404549", weight: 3, fill: false, dashArray: "15, 10"}).addTo(map)
         .bindTooltip("외곽 전술 격리 대장벽 (PERIMETER WALL)", {permanent: true, direction: "center", className: "blueprint-label"});

        // ==========================================
        // 🏞️ 2. 실제 지도 스타일의 지형물 (저수지, 공원, 보조 건물) 배치
        // ==========================================
        
        // [수자원] 남동쪽 거대 하수 처리 저수지 및 늪지 수로 수면 영역
        L.polygon([[40, 540], [150, 520], [240, 560], [240, 760], [40, 760]], 
            {color: "#283b47", weight: 1.5, fillColor: "#17242c", fillOpacity: 0.85}).addTo(map)
            .bindTooltip("제4 하수처리 저수지", {permanent: true, direction: "center", className: "blueprint-label"});

        // [녹지 1] 도심 중앙 근린 오염 공원 (Overgrown Central Park)
        L.polygon([[370, 340], [430, 340], [430, 410], [370, 410]], 
            {color: "#2e3a2e", weight: 1, fillColor: "#1a251a", fillOpacity: 0.8}).addTo(map)
            .bindTooltip("중앙 수목 공원", {permanent: true, direction: "center", className: "blueprint-label"});

        // [녹지 2] 의료원 주변 감염 수목 지대
        L.circle([170, 610], {radius: 35, color: "#253325", fillColor: "#152015", fillOpacity: 0.75}).addTo(map);

        // [인프라] 도로 및 철로망 가이드선
        L.polyline([[300, 25], [300, 775]], {color: "#26292b", weight: 8}).addTo(map); // 동서 관통 대로
        L.polyline([[25, 400], [575, 400]], {color: "#26292b", weight: 8}).addTo(map); // 남북 관통 대로
        L.polyline([[100, 100], [100, 775]], {color: "#495159", weight: 3, dashArray: "6, 6"}).addTo(map); // 하부 철로선

        // [보조 건물 데코레이션] 맵의 밀도를 높여주는 무명 민가/상업 빌딩 블록들
        const extraBuildings = [
            [[450, 300], [480, 330]], [[490, 300], [520, 320]], [[450, 350], [480, 380]], // 북쪽 도심 주택가 묘사
            [[220, 480], [260, 530]], [[230, 350], [260, 380]], // 중앙몰 하단 상가 상가
            [[530, 90], [560, 140]], [[530, 160], [560, 210]]   // 공장 북측 자재 창고동
        ];
        extraBuildings.forEach(coords => {
            L.rectangle(coords, {color: "#353a3f", weight: 1, fillColor: "#1f2224", fillOpacity: 0.8}).addTo(map);
        });

        // ==========================================
        // 🏢 3. 랜드마크 핵심 거점 실제 건물 외형 시뮬레이션
        // ==========================================
        
        // [중앙몰] 복합 단지 구획선 및 내부 몰 코어
        L.rectangle([[280, 340], [360, 460]], {color: "#464c52", weight: 2, fillColor: "#26292c", fillOpacity: 0.9}).addTo(map);
        L.rectangle([[295, 355], [345, 445]], {color: "#545b63", weight: 1, fillColor: "#1a1c1e", fillOpacity: 0.8}).addTo(map)
            .bindTooltip("중앙몰 코어 단지", {permanent: true, direction: "center", className: "blueprint-label"});

        // [더 타워] 요새화 빌딩 아키텍처 및 헬기 착륙장 링
        L.rectangle([[370, 470], [430, 530]], {color: "#4d5359", weight: 2, fillColor: "#2c2f32", fillOpacity: 0.9}).addTo(map);
        L.circle([400, 500], {radius: 14, color: "#c92a2a", weight: 1.5, fillColor: "#1c1e20", fillOpacity: 0.9}).addTo(map)
            .bindTooltip("더 타워", {permanent: true, direction: "right", className: "blueprint-label"});

        // [중앙의료원] H-Shape 복합 병동 입체 라인 고도화
        L.polygon([[120, 640], [180, 640], [180, 660], [160, 660], [160, 680], [180, 680], [180, 700], [120, 700], [120, 680], [140, 680], [140, 660], [120, 660]], 
            {color: "#3a4743", weight: 2, fillColor: "#202a27", fillOpacity: 0.95}).addTo(map)
            .bindTooltip("중앙의료원", {permanent: true, direction: "top", className: "blueprint-label"});

        // [제조공장] 북서쪽 공업단지 대형 메인 제조 창고 2개동
        L.rectangle([[450, 80], [520, 160]], {color: "#42474c", weight: 2, fillColor: "#232628", fillOpacity: 0.9}).addTo(map);
        L.rectangle([[460, 180], [510, 240]], {color: "#42474c", weight: 2, fillColor: "#232628", fillOpacity: 0.9}).addTo(map)
            .bindTooltip("제조 공장 단지", {permanent: true, direction: "top", className: "blueprint-label"});

        // [중앙도서관] 문화지구 ㄷ자형 서고 구조
        L.polygon([[350, 260], [410, 260], [410, 320], [390, 320], [390, 280], [350, 280]], 
            {color: "#4b5157", weight: 2, fillColor: "#232629", fillOpacity: 0.9}).addTo(map);

        // [차량묘지] 격자형 피난 차량 적치 구획
        L.rectangle([[220, 80], [280, 180]], {color: "#3b3e41", weight: 1, fillColor: "#181a1c", fillOpacity: 0.7, dashArray: "4, 4"}).addTo(map)
            .bindTooltip("차량 대기소 잔해", {permanent: true, direction: "center", className: "blueprint-label"});


        // ==========================================
        // 🚧 4. 대장벽선 내부 안착 통제 관문 장벽 디자인
        // ==========================================
        // ⭐ 요구사항: 통제 관문을 대장벽선 우측 경계선에 딱 맞물리도록 장벽 사이에 배치
        L.polyline([[440, 775], [540, 775]], {color: "#c92a2a", weight: 6}).addTo(map);
        L.polyline([[440, 771], [540, 771]], {color: "#a31c1c", weight: 2, dashArray: "4, 4"}).addTo(map)
            .bindTooltip("통제 격리 게이트", {permanent: true, direction: "left", className: "blueprint-label"});


        // ==========================================
        // 🎯 5. 14개 작전 거점 데이터 및 역삼각형 마커 매핑
        // ==========================================
        const jaeraeNodes = [
            { name: "침수된 지하 상가", icon: "💧", coords: [100, 200], desc: "철로 하부 인프라 구역. 허리까지 차오른 유독성 침수물 아래 군용 보급 상자가 잠겨 있습니다." },
            { name: "끝이 막힌 폐지하철", icon: "🚇", coords: [100, 450], desc: "폭발로 인해 선로 중앙에 열차들이 뒤엉켜 가로막힌 무덤. 내부 잔해물 수색이 필요합니다." },
            { name: "축축한 지하 철길", icon: "🛤️", coords: [100, 600], desc: "지하 배수 시스템 고장으로 상시 물이 차 있고 기괴한 균류가 증식한 위험 철로 구역입니다." },
            { name: "고요한 환승 구역", icon: "🔄", coords: [220, 700], desc: "철로 교차 허브 광장. 사방이 탁 트여 시야 확보는 유용하나 매복 공격의 위험이 큽니다." },
            { name: "비밀스러운 지하 수로", icon: "🌊", coords: [350, 700], desc: "하수 처리 저수지 외곽 분기점과 직결된 방사능 대피용 비밀 지하 수로 인프라입니다." },
            { name: "잿빛 공장 지대", icon: "🏭", coords: [485, 120], desc: "제1창고동 중심부. 유독 가스 밸브 차단 장치와 잔해물이 어지럽게 널려 있습니다." },
            { name: "고철 더미의 정원", icon: "🏗️", coords: [430, 220], desc: "공장 외곽 폐기 하적장. 엄폐용으로 활용 가능한 두꺼운 강철판 및 기계 부품 탈취 가능." },
            { name: "붕괴한 중앙몰", icon: "🏢", coords: [320, 400], desc: "대형 쇼핑몰 붕괴지 코어 구역. 내부 지하 주차장을 통해 어두운 비밀 통로로 연계됩니다." },
            { name: "파괴된 식자재 마트", icon: "🛒", coords: [250, 320], desc: "도심 서편 대형 유통 시설. 신선 식품은 유실되었으나 장기 보존식 및 공구류 획득이 가능합니다." },
            { name: "반파된 중앙 도서관", icon: "📚", coords: [380, 300], desc: "문화지구 ㄷ자 서고 내부. 유실되지 않은 고가치 재라에 행정 구역 기밀 지도 파편 잔존." },
            { name: "콘크리트 더 타워", icon: "🗼", coords: [400, 500], desc: "초고층 빌딩 하부 요새 보루. 상층부 무장 잔존 요원들이 외부 생존자 차단을 고수 중입니다." },
            { name: "버려진 차량들의 묘지", icon: "🚗", coords: [250, 130], desc: "교통 마비로 완전 정체된 피난 도로 변. 소량의 잔류 유류 및 차량 배터리 부품 채취 가능." },
            // 통제 관문 마커 위치를 우측 대장벽 장벽선 정중앙 위로 안착
            { name: "폐쇄된 통제 관문", icon: "🚧", coords: [490, 775], desc: "동쪽 대장벽 사이에 굳게 폐쇄된 군사 바리케이드 초소. 통과용 보안 키카드가 필수입니다." },
            { name: "초록늪 중앙 의료원", icon: "🏥", coords: [150, 670], desc: "H병동 본관 1층 로비. 감염 포자가 번식한 늪지 중앙에 있어 긴급 의약품 확보의 핵심지입니다." }
        ];

        // 🎯 마커 및 돋보기 커서 적용
        jaeraeNodes.forEach(node => {
            // ⭐ 요구사항: 마커 및 하부 요소까지 커서를 zoom-in(돋보기)으로 통일 적용한 역삼각형 마커
            const triangleHtml = `
                <div class="marker-container">
                    <div class="triangle-icon">${node.icon}</div>
                    <div class="triangle-down"></div>
                </div>
            `;

            const tacticalIcon = L.divIcon({
                html: triangleHtml,
                className: 'custom-tactical-marker',
                iconSize: [36, 32],
                iconAnchor: [18, 32], // 역삼각형의 하단 꼭짓점을 좌표 위치에 완전 밀착
                popupAnchor: [0, -32]
            });

            const marker = L.marker(node.coords, { icon: tacticalIcon }).addTo(map);
            
            marker.bindPopup(`
                <div class="popup-title">${node.icon} ${node.name}</div>
                <div style="font-size: 12px; line-height: 1.5; color: #bcccda;">${node.desc}</div>
                <div style="font-size: 10px; color: #5c6266; margin-top: 8px; text-align: right; font-family: monospace;">SYS_GRID: [X-${node.coords[1]}, Y-${node.coords[0]}]</div>
            `);
        });

        // ⭐ 요구사항: 첫 로드 시 현재 화면 규격에 맞춰 강제 뷰포트 고정
        map.fitBounds(mapBounds);

        // ⭐ 요구사항: 여기서 '더 이상 축소는 불가능'하도록 최소 줌 레벨을 현재 상태로 고정 (확대는 자유)
        map.setMinZoom(map.getZoom());
        map.setMaxZoom(map.getZoom() + 2); 
    </script>
</body>
</html>
